name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, build and dependency gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --filter @asistencia/api typecheck

      - name: Typecheck web
        run: pnpm --filter @asistencia/web typecheck

      - name: Build API
        run: pnpm --filter @asistencia/api build

      - name: Build web
        run: pnpm --filter @asistencia/web build

      - name: Block high and critical production advisories
        run: pnpm audit --prod --audit-level high
