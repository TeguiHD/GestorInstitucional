##########################################################################
# nginx reverse proxy — production (VPS, behind Cloudflare)
# Handles TLS termination + HTTP/2 + API proxy + static frontend
##########################################################################

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Upstream API
    upstream api {
        server api:4000;
        keepalive 16;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name asistencia.nicoholas.dev;
        return 301 https://$host$request_uri;
    }

    # HTTPS main server
    server {
        listen 443 ssl;
        http2 on;
        server_name asistencia.nicoholas.dev;

        ssl_certificate     /etc/letsencrypt/live/asistencia.nicoholas.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/asistencia.nicoholas.dev/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:CHACHA20';
        ssl_prefer_server_ciphers off;
        ssl_stapling on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-O+5Shd4Ef0cko2C3onkpCA1Sz0b/90W1KvTutfoYGx8=' 'sha256-vZpp7gCEQQ3pa3JgGU2EjAq9BSNPNH2BphCdMMJ+2KE=' 'sha256-3bZlwhjx19D2f0hBzvFZpfIMvWbMMACYTA9l46CQByU=' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self' https://cloudflareinsights.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

        client_max_body_size 10m;

        # API proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/login {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static frontend (SPA)
        location = /manifest.webmanifest {
            root /usr/share/nginx/html;
            default_type application/manifest+json;
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location ~ ^/(sw|service-worker)\.js$ {
            root /usr/share/nginx/html;
            default_type application/javascript;
            expires off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Service-Worker-Allowed "/" always;
            try_files $uri =404;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|woff2?|png|jpg|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }
    }
}
