services:
  db:
    image: mariadb:11.4
    container_name: asistencia_db_dev
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_dev_only
      MARIADB_DATABASE: asistencia
      MARIADB_USER: asistencia_app
      MARIADB_PASSWORD: dev_password_local
    ports:
      - '3307:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./mariadb/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  db_admin:
    image: phpmyadmin:5.2
    container_name: asistencia_dba_dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_USER: asistencia_app
      PMA_PASSWORD: dev_password_local
    ports:
      - '8080:80'

volumes:
  db_data:
    name: asistencia_db_dev_data
